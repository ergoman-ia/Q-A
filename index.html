<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근골 Q&A</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0056b3;
            font-size: 22px;
            text-align: center;
            margin-bottom: 10px;
        }

        p.desc {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
            min-height: 150px;
            line-height: 1.6;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        .admin-btn {
            background-color: #6c757d;
            margin-top: 12px;
        }

        .admin-btn:hover {
            background-color: #5a6268;
        }

        #adminMode {
            display: none;
        }

        .question-card {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 5px solid #0056b3;
        }

        .question-card h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #0056b3;
        }

        .question-card .content {
            margin: 0 0 10px 0;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 30px 0;
            font-size: 14px;
        }

        .status-msg {
            text-align: center;
            font-size: 13px;
            margin-top: 8px;
            min-height: 18px;
        }

        .status-msg.success {
            color: #28a745;
        }

        .status-msg.error {
            color: #dc3545;
        }

        @media (max-width: 768px) {
            #goToAdminBtn {
                display: none !important;
            }
        }

        .question-card.answered {
            background-color: #f8f9fa;
            border-left-color: #adb5bd;
            opacity: 0.7;
        }

        .question-card.answered h3,
        .question-card.answered .content {
            color: #6c757d;
            text-decoration: line-through;
        }

        .chk-label {
            font-size: 13px;
            font-weight: normal;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #444;
        }

        /* ── 비밀번호 모달 ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 8px;
            padding: 28px 24px 20px;
            width: 300px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-box h2 {
            margin: 0;
            font-size: 16px;
            color: #0056b3;
            text-align: center;
        }

        .pwd-input-wrap {
            position: relative;
        }

        .pwd-input-wrap input {
            width: 100%;
            padding: 10px 38px 10px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .pwd-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #888;
            width: auto;
            padding: 0;
        }

        .modal-error {
            color: #dc3545;
            font-size: 13px;
            text-align: center;
            min-height: 16px;
        }

        .modal-btns {
            display: flex;
            gap: 8px;
        }

        .modal-btns button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        .modal-cancel {
            background-color: #6c757d;
        }

        .modal-cancel:hover {
            background-color: #5a6268;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>근골격계부담작업 유해요인조사 Q&A</h1>

        <!-- ===== 사용자 모드 ===== -->
        <div id="userMode">
            <p class="desc">근골격계부담작업 유해요인조사 관련해 질문하십시오.<br><strong>완전 익명</strong>으로 진행됩니다.</p>

            <form id="qaForm">
                <div class="form-group">
                    <label for="questionContent">질문사항</label>
                    <textarea id="questionContent" placeholder="근골격계부담작업 유해요인조사와 관련한 사항을 자유롭게 적어주세요."
                        required></textarea>
                </div>
                <button type="submit" id="submitBtn">제출하기</button>
                <div class="status-msg" id="submitStatus"></div>
            </form>

            <button id="goToAdminBtn" class="admin-btn">관리자 모드 접속</button>
        </div>

        <!-- ===== 관리자 모드 ===== -->
        <div id="adminMode">
            <button id="goToUserBtn" class="admin-btn" style="background-color:#dc3545; margin-bottom:15px;">🔒 로그아웃
                (사용자 모드로)</button>

            <div
                style="margin-bottom: 15px; padding: 10px; background: #e9ecef; border-radius: 4px; display: flex; align-items: center; gap: 10px;">
                <label for="dateFilter" style="font-weight:bold; margin:0;">📅 날짜 검색:</label>
                <input type="date" id="dateFilter" style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                <button id="refreshDataBtn"
                    style="width: auto; padding: 5px 10px; font-size: 13px; background-color: #17a2b8;">🔄 최신화</button>
            </div>

            <div id="questionList"></div>
        </div>
    </div>

    <!-- ===== 비밀번호 모달 ===== -->
    <div class="modal-overlay" id="pwdModal">
        <div class="modal-box">
            <h2>🔐 관리자 로그인</h2>
            <div class="pwd-input-wrap">
                <input type="password" id="pwdInput" placeholder="비밀번호를 입력하세요" autocomplete="off">
                <button type="button" class="pwd-toggle" id="pwdToggle">👁</button>
            </div>
            <div class="modal-error" id="pwdError"></div>
            <div class="modal-btns">
                <button type="button" class="modal-cancel" id="pwdCancel">취소</button>
                <button type="button" id="pwdConfirm">확인</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzsWR7BzuhVSp7ytG9LyEStn30iQY_kCvbMEFO10xE6vfTR2KUJ5UogCCoBr61fFba-JQ/exec";

        const form = document.getElementById('qaForm');
        const questionList = document.getElementById('questionList');
        const userMode = document.getElementById('userMode');
        const adminMode = document.getElementById('adminMode');
        const goToAdminBtn = document.getElementById('goToAdminBtn');
        const goToUserBtn = document.getElementById('goToUserBtn');
        const submitBtn = document.getElementById('submitBtn');
        const submitStatus = document.getElementById('submitStatus');

        // ── 비밀번호 모달 ──────────────────────────────────────
        const pwdModal = document.getElementById('pwdModal');
        const pwdInput = document.getElementById('pwdInput');
        const pwdToggle = document.getElementById('pwdToggle');
        const pwdConfirm = document.getElementById('pwdConfirm');
        const pwdCancel = document.getElementById('pwdCancel');
        const pwdError = document.getElementById('pwdError');

        // 비밀번호 표시/숨기기 토글
        pwdToggle.addEventListener('click', function () {
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                pwdToggle.textContent = '🙈';
            } else {
                pwdInput.type = 'password';
                pwdToggle.textContent = '👁';
            }
        });

        // 모달 열기
        goToAdminBtn.addEventListener('click', function () {
            pwdInput.value = '';
            pwdInput.type = 'password';
            pwdToggle.textContent = '👁';
            pwdError.textContent = '';
            pwdModal.classList.add('active');
            setTimeout(() => pwdInput.focus(), 50);
        });

        // 모달 닫기
        pwdCancel.addEventListener('click', closeModal);
        pwdModal.addEventListener('click', function (e) {
            if (e.target === pwdModal) closeModal(); // 배경 클릭 시 닫기
        });

        function closeModal() {
            pwdModal.classList.remove('active');
            pwdInput.value = '';
            pwdError.textContent = '';
        }

        // Enter 키로 확인
        pwdInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') pwdConfirm.click();
        });
        
        const ADMIN_HASH = "d7e46480f7570a02bbe655c893bc6259052f596267db07938574d94340849e36";

        let adminKey = "";

        async function hashPassword(pwd) {
            const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pwd));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        pwdConfirm.addEventListener('click', async function () {
            const pwd = pwdInput.value;
            if (!pwd) {
                pwdError.textContent = "비밀번호를 입력하세요.";
                return;
            }

            pwdConfirm.disabled = true;
            pwdConfirm.textContent = "확인 중...";

            const hashed = await hashPassword(pwd);
            if (hashed === ADMIN_HASH) {
                adminKey = pwd;
                closeModal();
                userMode.style.display = 'none';
                adminMode.style.display = 'block';
                fetchQuestions();
            } else {
                pwdError.textContent = "❌ 비밀번호가 틀렸습니다.";
                pwdInput.value = '';
                pwdInput.focus();
            }

            pwdConfirm.disabled = false;
            pwdConfirm.textContent = "확인";
        });

        // ── 질문 제출 ──────────────────────────────────────────
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const content = document.getElementById('questionContent').value.trim();
            if (!content) return;

            submitBtn.disabled = true;
            submitBtn.textContent = "접수 중...";
            submitStatus.className = "status-msg";
            submitStatus.textContent = "";

            const date = new Date().toLocaleString('ko-KR');

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    redirect: "follow",
                    body: JSON.stringify({ type: "question", content, date })
                });
                if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
                const result = await res.json();

                if (result.result === "success") {
                    form.reset();
                    submitStatus.className = "status-msg success";
                    submitStatus.textContent = "✅ 질문이 성공적으로 접수되었습니다. 감사합니다!";
                    setTimeout(() => {
                        submitStatus.textContent = "";
                        submitStatus.className = "status-msg";
                    }, 3000);
                } else {
                    throw new Error(result.message || "알 수 없는 에러가 발생했습니다.");
                }
            } catch (err) {
                submitStatus.className = "status-msg error";
                submitStatus.textContent = "❌ 오류 상세: " + err.message;
                console.error("에러 원인:", err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "제출하기";
            }
        });

        // ── 데이터 보관용 변수 ─────────────────────────────────
        let allQuestions = [];
        let lastDataString = "";

        async function fetchQuestions(isBackground = false) {
            if (!isBackground) {
                questionList.innerHTML = '<div class="loading">⏳ 목록을 불러오는 중...</div>';
            }

            try {
                const res = await fetch(API_URL + "?adminKey=" + encodeURIComponent(adminKey) + "&t=" + Date.now(), { redirect: "follow" });
                if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
                const newData = await res.json();

                // unauthorized 응답 처리
                if (newData.error === "unauthorized") throw new Error("인증 실패");

                const newDataString = JSON.stringify(newData);

                if (lastDataString !== newDataString) {
                    allQuestions = newData;
                    lastDataString = newDataString;
                    renderFilteredQuestions();
                } else if (!isBackground) {
                    renderFilteredQuestions();
                }
            } catch (err) {
                if (!isBackground) {
                    questionList.innerHTML = '<p style="text-align:center;color:#dc3545;">❌ 목록을 불러오지 못했습니다.</p>';
                }
            }
        }

        // ── 날짜 필터링 후 화면 그리기 ────────────────────────
        function renderFilteredQuestions() {
            questionList.innerHTML = '';

            const filterDate = document.getElementById('dateFilter').value;
            let filtered = allQuestions;

            if (filterDate) {
                const [y, m, d] = filterDate.split('-');
                const searchStr = `${y}. ${parseInt(m)}. ${parseInt(d)}.`;
                filtered = allQuestions.filter(q => q.date.includes(searchStr));
            }

            if (!filtered.length) {
                questionList.innerHTML = '<p style="text-align:center;color:#999;">해당 날짜에 접수된 의견이 없습니다.</p>';
                return;
            }

            // ✅ index 추가
            [...filtered].reverse().forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                // ✅ index 포함으로 충돌 방지
                const uniqueId = 'chk_' + index + '_' + q.date.replace(/[^0-9]/g, '');

                const isChecked = localStorage.getItem(uniqueId) === "true";
                if (isChecked) card.classList.add('answered');

                card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                    <h3 style="margin: 0;">📝 ${q.date}</h3>
                    <label class="chk-label" for="${uniqueId}">
                        <input type="checkbox" id="${uniqueId}" ${isChecked ? 'checked' : ''}> 답변 완료
                    </label>
                </div>
                <p class="content" style="margin: 0;">${escapeHtml(q.content)}</p>
            `;

                const checkbox = card.querySelector(`#${uniqueId}`);
                checkbox.addEventListener('change', function () {
                    if (this.checked) {
                        card.classList.add('answered');
                        localStorage.setItem(uniqueId, "true");
                    } else {
                        card.classList.remove('answered');
                        localStorage.removeItem(uniqueId);
                    }
                });

                questionList.append(card);
            });
        }

        document.getElementById('dateFilter').addEventListener('change', renderFilteredQuestions);
        document.getElementById('refreshDataBtn').addEventListener('click', () => fetchQuestions());

        setInterval(function () {
            if (adminMode.style.display === 'block') {
                fetchQuestions(true);
            }
        }, 30000);

        // ── XSS 방지용 HTML 이스케이프 ────────────────────────
        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ── 로그아웃 ──────────────────────────────────────────
        goToUserBtn.addEventListener('click', function () {
            adminMode.style.display = 'none';
            userMode.style.display = 'block';
            adminKey = "";           // ✅ 키 초기화
            lastDataString = "";     // ✅ 캐시 초기화
            document.getElementById('dateFilter').value = '';
            questionList.innerHTML = '';
            allQuestions = [];
        });
    </script>
</body>

</html>
