<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근골격계부담작업 유해요인조사 Q&A</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0056b3;
            font-size: 22px;
            text-align: center;
            margin-bottom: 10px;
        }
        p.desc {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
            min-height: 150px;
            line-height: 1.6;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }

        .admin-btn {
            background-color: #6c757d;
            margin-top: 12px;
        }
        .admin-btn:hover { background-color: #5a6268; }

        #adminMode { display: none; }

        /* 질문 카드 */
        .question-card {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 5px solid #0056b3;
        }
        .question-card h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #0056b3;
        }
        .question-card .content {
            margin: 0 0 10px 0;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }

        /* 답변 영역 */
        .answer-box {
            background-color: #d4edda;
            border-left: 4px solid #28a745;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
            color: #155724;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .no-answer {
            color: #999;
            font-size: 13px;
            font-style: italic;
        }

        /* 관리자 답변 입력 폼 */
        .answer-form {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .answer-form textarea {
            min-height: 60px;
            font-size: 13px;
            flex: 1;
        }
        .answer-submit-btn {
            width: auto;
            padding: 8px 14px;
            font-size: 13px;
            background-color: #0056b3;
            flex-shrink: 0;
            align-self: flex-end;
        }
        .answer-submit-btn:hover { background-color: #004494; }

        /* 로딩 스피너 */
        .loading {
            text-align: center;
            color: #888;
            padding: 30px 0;
            font-size: 14px;
        }

        /* 상태 메시지 */
        .status-msg {
            text-align: center;
            font-size: 13px;
            margin-top: 8px;
            min-height: 18px;
        }
        .status-msg.success { color: #28a745; }
        .status-msg.error   { color: #dc3545; }

        /* 새로고침 버튼 */
        .refresh-btn {
            background-color: #17a2b8;
            margin-bottom: 16px;
        }
        .refresh-btn:hover { background-color: #138496; }
    </style>
</head>
<body>
<div class="container">
    <h1>근골격계부담작업 유해요인조사 Q&A</h1>

    <!-- ===== 사용자 모드 ===== -->
    <div id="userMode">
        <p class="desc">현장의 유해 요인이나 작업 불편 사항을 자유롭게 적어주세요.<br>본 조사는 <strong>완전 익명</strong>으로 진행됩니다.</p>

        <form id="qaForm">
            <div class="form-group">
                <label for="questionContent">질문 및 건의사항</label>
                <textarea id="questionContent" placeholder="작업 중 느끼는 신체적 부담(목, 어깨, 허리 등)이나 개선이 필요한 사항을 자유롭게 적어주세요." required></textarea>
            </div>
            <button type="submit" id="submitBtn">질문 등록하기</button>
            <div class="status-msg" id="submitStatus"></div>
        </form>

        <button id="goToAdminBtn" class="admin-btn">관리자 모드 접속</button>
    </div>

    <!-- ===== 관리자 모드 ===== -->
    <div id="adminMode">
        <p class="desc" style="color:#d9534f; font-weight:bold;">[관리자 전용] 접수된 의견 목록</p>
        <button id="goToUserBtn" class="admin-btn" style="margin-bottom:15px;">질문 작성 화면으로 돌아가기</button>
        
        <div style="margin-bottom: 15px; padding: 10px; background: #e9ecef; border-radius: 4px;">
            <label for="dateFilter" style="display:inline; margin-right:10px; font-weight:bold;">📅 날짜 검색:</label>
            <input type="date" id="dateFilter" style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        
        <div id="questionList"></div>
    </div>
</div>

<script>
    // ★★★ 여기에 Apps Script 배포 URL을 붙여넣으세요 ★★★
    const API_URL = "https://script.google.com/macros/s/AKfycbzsWR7BzuhVSp7ytG9LyEStn30iQY_kCvbMEFO10xE6vfTR2KUJ5UogCCoBr61fFba-JQ/exec";

    const form          = document.getElementById('qaForm');
    const questionList  = document.getElementById('questionList');
    const userMode      = document.getElementById('userMode');
    const adminMode     = document.getElementById('adminMode');
    const goToAdminBtn  = document.getElementById('goToAdminBtn');
    const goToUserBtn   = document.getElementById('goToUserBtn');
    const submitBtn     = document.getElementById('submitBtn');
    const submitStatus  = document.getElementById('submitStatus');
    const refreshBtn    = document.getElementById('refreshBtn');

    // ── 질문 등록 ──────────────────────────────────────────
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const content = document.getElementById('questionContent').value.trim();
        if (!content) return;

        submitBtn.disabled = true;
        submitBtn.textContent = "등록 중...";
        submitStatus.className = "status-msg";
        submitStatus.textContent = "";

        const date = new Date().toLocaleString('ko-KR');

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                redirect: "follow", // 👈 구글 서버의 리다이렉트를 정상적으로 따라가도록 추가
                body: JSON.stringify({ type: "question", content, date })
            });
            const result = await res.json();

            if (result.result === "success") {
                form.reset();
                submitStatus.className = "status-msg success";
                submitStatus.textContent = "✅ 질문이 성공적으로 접수되었습니다. 감사합니다!";
            } else {
                // ✅ 구글 스크립트가 보내준 '진짜 에러 이유'를 던집니다!
                throw new Error(result.message || "알 수 없는 에러가 발생했습니다."); 
            }
        } catch(err) {
            submitStatus.className = "status-msg error";
            submitStatus.textContent = "❌ 오류 상세: " + err.message; // 👈 진짜 에러의 이름을 화면에 출력합니다!
            console.error("에러 원인:", err);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "질문 등록하기";
        }
    });

    // ── 데이터 보관용 변수 (새로 추가됨) ─────────────────────
    let allQuestions = [];

    // ── 질문 목록 서버에서 불러오기 (한 번만 실행됨) ──────────
    async function fetchQuestions() {
        questionList.innerHTML = '<div class="loading">⏳ 목록을 불러오는 중...</div>';
        try {
            const res = await fetch(API_URL + "?t=" + Date.now(), { redirect: "follow" });
            allQuestions = await res.json();
            renderFilteredQuestions(); // 데이터를 가져온 후 화면에 그리기
        } catch(err) {
            questionList.innerHTML = '<p style="text-align:center;color:#dc3545;">❌ 목록을 불러오지 못했습니다.</p>';
        }
    }

    // ── 날짜 조건에 맞게 즉시 화면 그리기 (실시간 필터링!) ──────
    function renderFilteredQuestions() {
        questionList.innerHTML = '';
        
        const filterDate = document.getElementById('dateFilter').value; // 달력에서 선택한 날짜 (예: 2026-04-10)
        let filtered = allQuestions;

        // 선택한 날짜가 있으면 해당 날짜만 걸러냅니다.
        if (filterDate) {
            const [y, m, d] = filterDate.split('-');
            const searchStr = `${y}. ${parseInt(m)}. ${parseInt(d)}.`; // 구글 시트에 찍힌 날짜 형식과 맞춤
            filtered = allQuestions.filter(q => q.date.includes(searchStr));
        }

        if (!filtered.length) {
            questionList.innerHTML = '<p style="text-align:center;color:#999;">해당 날짜에 접수된 의견이 없습니다.</p>';
            return;
        }

        // 최신 순으로 역순 출력 (답변 관련 코드는 모두 삭제되었습니다)
        [...filtered].reverse().forEach((q) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <h3>📝 ${q.date}</h3>
                <p class="content">${escapeHtml(q.content)}</p>
            `;
            questionList.append(card);
        });
    }

    // ✅ 달력의 날짜를 바꿀 때마다... (기존 코드)
    document.getElementById('dateFilter').addEventListener('change', renderFilteredQuestions);
    
    // ✅ 최신화 버튼을 누르면... (기존 코드)
    document.getElementById('refreshDataBtn').addEventListener('click', fetchQuestions);

    // ⬇️ 여기서부터 복사해서 추가해 주세요 ⬇️
    // ⏰ 대시보드 모드: 관리자 화면이 켜져 있을 때만 10초마다 몰래 데이터를 가져옵니다.
    setInterval(function() {
        if (adminMode.style.display === 'block') { // 관리자 화면을 보고 있을 때만 작동
            fetchQuestions(); // 서버에서 최신 데이터를 몰래 가져와서 화면에 뿌립니다
        }
    }, 10000); // 10000은 10초를 의미합니다. (30초는 30000)
    
    // ── XSS 방지용 HTML 이스케이프 ─────────────────────────
    function escapeHtml(str) {
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    // ── 관리자 모드 전환 ────────────────────────────────────
    goToAdminBtn.addEventListener('click', function() {
        const pwd = prompt("관리자 비밀번호를 입력하세요.");
        if (pwd === "1234") {          // ← 비밀번호 변경 가능
            userMode.style.display  = 'none';
            adminMode.style.display = 'block';
            fetchQuestions();
        } else if (pwd !== null) {
            alert("비밀번호가 틀렸습니다.");
        }
    });

    goToUserBtn.addEventListener('click', function() {
        adminMode.style.display = 'none';
        userMode.style.display  = 'block';
    });
    
</script>
</body>
</html>
